<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Video Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0a0a0a;
  color: #fff;
}

header {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: linear-gradient(180deg, rgba(0,0,0,0.7), #000),
              url('https://images.unsplash.com/photo-1498050108023-c5249f4df085') center/cover;
}

h1 {
  font-size: 4rem;
}

p {
  color: #aaa;
}

.btn {
  margin-top: 20px;
  padding: 12px 30px;
  background: linear-gradient(45deg, #00ffaa, #00aaff);
  color: #000;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

section {
  padding: 80px 10%;
}

h2 {
  text-align: center;
  margin-bottom: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
}

.card {
  border-radius: 20px;
  overflow: hidden;
  background: #111;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* 🔥 VIDEO FIX */
video {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}

/* ANIMACJE */
.hidden {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

footer {
  text-align: center;
  padding: 40px;
  color: #666;
}
</style>
</head>

<body>

<header>
  <h1>Twoje Imię</h1>
  <p>Video Editor / Social Media</p>
  <a href="#portfolio" class="btn">Zobacz projekty</a>
</header>

<section id="portfolio" class="hidden">
  <h2>Moje montaże</h2>

  <div class="grid">

    <div class="card">
      <video autoplay muted loop playsinline>
        <source src="video2.mp4" type="video/mp4">
      </video>
    </div>

    <div class="card">
      <video autoplay muted loop playsinline>
        <source src="video3.mp4" type="video/mp4">
      </video>
    </div>

  </div>
</section>

<section class="hidden">
  <h2>O mnie</h2>
  <p style="max-width:600px; margin:auto; text-align:center;">
    Jestem montażystą z dużym doświadczeniem. Tworzę dynamiczne materiały na TikTok, Instagram oraz YouTube.
  </p>
</section>

<footer>
  © 2026 Portfolio
</footer>

<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".hidden").forEach(el => observer.observe(el));
</script>

</body>
</html>
