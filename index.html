<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | Video Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  background: radial-gradient(circle at top, #111, #000);
  color: #fff;
}

/* HERO */

header {
  height: 100vh;
  background: linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,1)),
              url('https://images.unsplash.com/photo-1498050108023-c5249f4df085') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(10px);
  text-align: center;
}

header h1 {
  font-size: 4rem;
  animation: fadeUp 1s ease forwards;
}

header p {
  color: #aaa;
  margin-top: 10px;
  animation: fadeUp 1.5s ease forwards;
}

.btn {
  margin-top: 30px;
  padding: 14px 30px;
  border-radius: 12px;
  background: linear-gradient(45deg, #00ffcc, #00aaff);
  color: #000;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
  animation: fadeUp 2s ease forwards;
}

.btn:hover {
  transform: scale(1.1);
}

/* SEKCJE */

section {
  padding: 100px 10%;
}

/* GRID VIDEO */

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(20px);
  transition: 0.4s;
}

.card video {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

/* O MNIE */

.about {
  max-width: 700px;
  margin: auto;
  text-align: center;
  color: #bbb;
}

/* ANIMACJE */

.hidden {
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* FOOTER */

footer {
  text-align: center;
  padding: 40px;
  color: #777;
}

</style>
</head>

<body>

<header>
  <h1>Twoje Imię</h1>
  <p>Video Editor / Social Media</p>
  <a href="#portfolio" class="btn">Zobacz projekty</a>
</header>

<section id="portfolio" class="hidden">
  <h2 style="text-align:center; margin-bottom:50px;">Moje montaże</h2>

  <div class="grid">

    <div class="card">
      <video src="video1.mp4" autoplay muted loop></video>
    </div>

    <div class="card">
      <video src="video2.mp4" autoplay muted loop></video>
    </div>

    <div class="card">
      <video src="video3.mp4" autoplay muted loop></video>
    </div>

  </div>
</section>

<section class="hidden">
  <h2 style="text-align:center; margin-bottom:30px;">O mnie</h2>
  <p class="about">
    Jestem montażystą z dużym doświadczeniem. Tworzę dynamiczne treści na TikTok, Instagram oraz YouTube.
    Stawiam na jakość, tempo i nowoczesny styl.
  </p>
</section>

<footer>
  © 2026 Portfolio
</footer>

<script>

/* ANIMACJE SCROLL */

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".hidden").forEach(el => observer.observe(el));

</script>

</body>
</html>
